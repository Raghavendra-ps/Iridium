{% extends base_template %}

{% block title %}Job History{% endblock %}

{% block content %}
<div class="card">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
        <h2 class="card-title" style="margin-bottom: 0;">Archived Jobs History</h2>
    </div>

    <table style="width: 100%; border-collapse: collapse; text-align: left;">
        <thead>
            <tr style="border-bottom: 1px solid var(--color-border);">
                <th style="padding: 12px 0;">Filename / Doc Name</th>
                <th id="th-owner" style="padding: 12px 0; display: none;">Owner</th>
                <th style="padding: 12px 0;">Created</th>
                <th style="padding: 12px 0;">Status</th>
                <th style="padding: 12px 0; text-align: right;">Actions</th>
            </tr>
        </thead>
        <tbody id="history-table-body">
            <tr>
                <td colspan="5" style="padding: 48px 0; text-align: center; color: var(--color-text-muted);">Loading
                    history...</td>
            </tr>
        </tbody>
    </table>
</div>

<style>
    .status-pill {
        padding: 4px 8px;
        border-radius: 6px;
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        background: #f1f5f9;
        color: #475569;
    }

    .status-completed {
        background: #dcfce7;
        color: #166534;
    }

    .status-failed {
        background: #fee2e2;
        color: #991b1b;
    }
</style>
{% endblock %}

{% block scripts %}
<script>
    function onPageLoad(token, currentUser) {
        const tableBody = document.getElementById('history-table-body');
        const thOwner = document.getElementById('th-owner');

        if (currentUser.role === 'superadmin') {
            thOwner.style.display = "table-cell";
        }

        const apiCall = (url, options) => fetch(url, { ...options, headers: { 'Authorization': `Bearer ${token}` } });

        const fetchHistory = async () => {
            try {
                const response = await apiCall('/api/v1/conversions/history');
                if (!response.ok) throw new Error('Failed to fetch history');
                const data = await response.json();

                tableBody.innerHTML = '';
                if (data.length === 0) {
                    tableBody.innerHTML = `<tr><td colspan="5" style="padding: 48px 0; text-align: center; color: var(--color-text-muted);">No archived jobs found.</td></tr>`;
                    return;
                }

                data.forEach(item => {
                    const statusClass = item.status.toLowerCase().includes('failed') ? 'status-failed' :
                        item.status.toLowerCase().includes('completed') ? 'status-completed' : '';

                    const row = document.createElement('tr');
                    row.style.borderBottom = '1px solid var(--color-border)';
                    row.innerHTML = `
                    <td style="padding: 16px 0;"><strong>${item.original_filename}</strong><br><small style="color: #64748b">${item.target_doctype}</small></td>
                    ${currentUser.role === 'superadmin' ? `<td style="padding: 16px 0;">${item.owner_email || '-'}</td>` : ''}
                    <td style="padding: 16px 0; font-size: 0.9rem;">${item.created_at}</td>
                    <td style="padding: 16px 0;"><span class="status-pill ${statusClass}">${item.status}</span></td>
                    <td style="padding: 16px 0; text-align: right;">
                        <button onclick="restoreJob(${item.id})" class="btn" style="padding: 8px 12px; font-size: 0.8rem;">Restore</button>
                    </td>
                `;
                    tableBody.appendChild(row);
                });
            } catch (e) {
                tableBody.innerHTML = `<tr><td colspan="5" style="padding: 48px 0; text-align: center; color: red;">Error loading history.</td></tr>`;
            }
        };

        window.restoreJob = async (id) => {
            if (!confirm('Restore this job to the main dashboard?')) return;
            try {
                const res = await apiCall(`/api/v1/conversions/${id}/restore`, { method: 'POST' });
                if (res.ok) {
                    fetchHistory();
                } else {
                    alert('Failed to restore job.');
                }
            } catch (e) {
                alert('Error restoring job.');
            }
        };

        fetchHistory();
    }
</script>
{% endblock %}
